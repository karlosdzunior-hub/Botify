services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_PATH: /app/data/bot-factory.db
      SESSION_SECRET: ${SESSION_SECRET}
      FERNET_KEY: ${FERNET_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      MAIN_BOT_TOKEN: ${MAIN_BOT_TOKEN}
      MINI_APP_URL: ${MINI_APP_URL}
      ADMIN_USER_ID: ${ADMIN_USER_ID}
      CREDITS_ON_REGISTER: ${CREDITS_ON_REGISTER:-30}
      YUMONEY_WALLET: ${YUMONEY_WALLET:-}
      YUMONEY_NOTIFICATION_SECRET: ${YUMONEY_NOTIFICATION_SECRET:-}
    volumes:
      - ./data:/app/data
      - /usr/bin/python3:/usr/bin/python3:ro
      - /usr/lib/python3:/usr/lib/python3:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - api

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done'"

volumes:
  certbot_www:
  certbot_conf:
